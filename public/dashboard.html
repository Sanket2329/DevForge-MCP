<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MCP Dev Dashboard</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #12161e;
    --panel-border: #1f2530;
    --text: #e6e8eb;
    --muted: #7d8590;
    --accent: #ffb454;
    --good: #5eead4;
    --bad: #ff6b6b;
    --mono: ui-monospace, "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--sans); padding: 32px;
  }
  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
  .prompt { font-family: var(--mono); color: var(--accent); font-size: 15px; }
  .prompt .cursor { display: inline-block; width: 8px; height: 16px; background: var(--accent); margin-left: 4px; animation: blink 1.1s steps(1) infinite; vertical-align: -2px; }
  @keyframes blink { 50% { opacity: 0; } }
  h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  select {
    background: var(--panel); color: var(--text); border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 6px 10px; font-family: var(--mono); font-size: 13px;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px;
    padding: 18px 20px;
  }
  .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .card .value { font-size: 22px; font-weight: 600; font-family: var(--mono); }
  .card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); word-break: break-all; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.ok { background: var(--good); }
  .dot.fail { background: var(--bad); }
  .wide { grid-column: 1 / -1; }
  ul.feed { list-style: none; margin: 0; padding: 0; font-family: var(--mono); font-size: 12.5px; color: var(--muted); max-height: 220px; overflow-y: auto; }
  ul.feed li { padding: 5px 0; border-bottom: 1px solid var(--panel-border); }
  ul.feed li:last-child { border-bottom: none; }
  .err { color: var(--bad); white-space: pre-wrap; font-family: var(--mono); font-size: 12px; max-height: 200px; overflow-y: auto; }
  footer { margin-top: 24px; color: var(--muted); font-size: 11px; font-family: var(--mono); }
</style>
</head>
<body>
  <header>
    <h1>MCP Dev Dashboard</h1>
    <span class="prompt" id="prompt">leadsense@mcp:~$<span class="cursor"></span></span>
    <select id="projectSelect" title="Switch active project"></select>
  </header>

  <div class="grid">
    <div class="card">
      <div class="label">Active Project</div>
      <div class="value" id="projectName">—</div>
      <div class="sub" id="projectPath">—</div>
    </div>
    <div class="card">
      <div class="label">Indexed Files</div>
      <div class="value" id="indexSize">—</div>
      <div class="sub" id="lastScan">—</div>
    </div>
    <div class="card">
      <div class="label">Architecture</div>
      <div class="value" id="archPrimary">—</div>
      <div class="sub" id="archLang">—</div>
    </div>
    <div class="card">
      <div class="label">Build Status</div>
      <div class="value pill" id="buildStatus"><span class="dot ok"></span> unknown</div>
      <div class="sub" id="buildTool">—</div>
    </div>
    <div class="card">
      <div class="label">Git Status</div>
      <div class="value" id="gitBranch">—</div>
      <div class="sub" id="gitChanges">—</div>
    </div>
    <div class="card wide" id="buildErrorCard" style="display:none;">
      <div class="label">Last Build Error</div>
      <div class="err" id="buildError"></div>
    </div>
    <div class="card">
      <div class="label">Recent Searches</div>
      <ul class="feed" id="recentSearches"></ul>
    </div>
    <div class="card">
      <div class="label">Conversation History</div>
      <ul class="feed" id="conversation"></ul>
    </div>
  </div>

  <footer>Polling /api/dashboard every 4s · this page is local-only, not exposed via MCP</footer>

<script>
async function fetchJSON(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function refresh() {
  try {
    const data = await fetchJSON("/api/dashboard");

    document.getElementById("projectName").textContent = data.project.name;
    document.getElementById("projectPath").textContent = data.project.path;
    document.getElementById("indexSize").textContent = data.project.indexSize ?? 0;
    document.getElementById("lastScan").textContent = data.project.lastScan ? "scanned " + new Date(data.project.lastScan).toLocaleTimeString() : "not scanned yet";

    document.getElementById("archPrimary").textContent = data.architecture?.primary || "—";
    document.getElementById("archLang").textContent = [data.architecture?.language, data.architecture?.framework].filter(Boolean).join(" · ") || "—";

    const buildEl = document.getElementById("buildStatus");
    const ok = !data.build?.error;
    buildEl.innerHTML = `<span class="dot ${ok ? "ok" : "fail"}"></span> ${ok ? "passing" : "failing"}`;
    document.getElementById("buildTool").textContent = data.build?.tool || "—";

    const errCard = document.getElementById("buildErrorCard");
    if (data.build?.error) {
      errCard.style.display = "block";
      document.getElementById("buildError").textContent = data.build.error.slice(0, 3000);
    } else {
      errCard.style.display = "none";
    }

    document.getElementById("gitBranch").textContent = data.git?.branch || "—";
    document.getElementById("gitChanges").textContent = data.git?.changedFiles != null ? `${data.git.changedFiles} changed file(s)` : (data.git?.error || "—");

    const searchesEl = document.getElementById("recentSearches");
    searchesEl.innerHTML = (data.recentSearches || []).slice(-15).reverse()
      .map((q) => `<li>${escapeHtml(q)}</li>`).join("") || "<li>No searches yet</li>";

    const convoEl = document.getElementById("conversation");
    convoEl.innerHTML = (data.conversationHistory || []).slice(-15).reverse()
      .map((c) => `<li>${escapeHtml((c.role || "?") + ": " + (c.content || "").slice(0, 90))}</li>`).join("") || "<li>No conversation turns yet</li>";

    // Project switcher
    const select = document.getElementById("projectSelect");
    const current = data.allProjects.find((p) => p.active);
    if (select.dataset.hydrated !== "1" || select.options.length !== data.allProjects.length) {
      select.innerHTML = data.allProjects.map((p) => `<option value="${escapeHtml(p.name)}" ${p.active ? "selected" : ""}>${escapeHtml(p.name)}</option>`).join("");
      select.dataset.hydrated = "1";
    } else if (current) {
      select.value = current.name;
    }
  } catch (err) {
    console.error("dashboard refresh failed", err);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

document.getElementById("projectSelect").addEventListener("change", async (e) => {
  await fetchJSON("/api/select-project", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ project: e.target.value }) });
  refresh();
});

refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
