[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/status"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Set these in the Railway dashboard → Variables:
#   PROJECT_PATH      — path to the repo Railway checked out
#   WORKSPACE_ROOT     — parent folder containing it (and any siblings)
#   PORT                — Railway sets this automatically, no need to set it
#   MCP_API_KEY         — optional, protects the dashboard REST API only
